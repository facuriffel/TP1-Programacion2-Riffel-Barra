<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Perfil - Lana & Lino</title>
    <link rel="stylesheet" href="../css/global.css">
</head>

<body>
    <main class="profile-container">
        <h2>Mis Datos Personales</h2>

        <form id="form-perfil">
            <div class="form-group">
                <label for="perfil-nombre">Nombre</label>
                <input type="text" id="perfil-nombre" required>
            </div>

            <div class="form-group">
                <label for="perfil-apellido">Apellido</label>
                <input type="text" id="perfil-apellido" required>
            </div>

            <div class="form-group">
                <label for="perfil-email">Correo Electrónico</label>
                <input type="email" id="perfil-email" disabled>
            </div>

            <div class="form-group">
                <label for="perfil-password">Contraseña</label>
                <input type="text" id="perfil-password" required placeholder="Contraseña">
            </div>

            <div class="form-group">
                <label for="perfil-direccion">Dirección de Envío</label>
                <input type="text" id="perfil-direccion" placeholder="Ej: Calle Falsa 123">
            </div>

            <div class="form-group">
                <label for="perfil-telefono">Teléfono de Contacto</label>
                <input type="text" id="perfil-telefono" placeholder="Ej: 341 555 5555">
            </div>

            <button type="submit" class="btn-primary">Actualizar mis datos</button>
        </form>
    </main>

    <script type="module" src="../js/perfil.js"></script>
</body>

</html>
