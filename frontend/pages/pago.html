<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pago - Lana &amp; Lino</title>
    <link rel="stylesheet" href="../css/global.css">
</head>

<body>
    <main class="payment-container">
        <h2>Finalizar Compra</h2>

        <!-- Resumen de compra -->
        <div id="resumen-compra" class="payment-summary">
            <h3>Resumen de Productos</h3>
            <div id="resumen-items">Cargando productos...</div>
            <h4 class="payment-total">Total a Pagar: $<span id="total-pago">0</span></h4>
        </div>

        <form id="form-pago">
            <div class="form-group">
                <label for="metodo-pago">Método de Pago</label>
                <select id="metodo-pago" required>
                    <option value="">Seleccioná una opción...</option>
                    <option value="transferencia">Transferencia Bancaria</option>
                    <option value="debito">Tarjeta de Débito</option>
                    <option value="credito">Tarjeta de Crédito</option>
                </select>
            </div>

            <div id="datos-tarjeta" style="display: none;">
                <div class="form-group">
                    <label for="num-tarjeta">Número de Tarjeta</label>
                    <input type="text" id="num-tarjeta" placeholder="16 dígitos">
                </div>
                <div class="form-group">
                    <label for="vencimiento-tarjeta">Fecha de Vencimiento (MM/AA)</label>
                    <input type="text" id="vencimiento-tarjeta" placeholder="MM/AA">
                </div>
                <div class="form-group">
                    <label for="titular-tarjeta">Nombre en la Tarjeta</label>
                    <input type="text" id="titular-tarjeta" placeholder="Nombre completo del titular">
                </div>
            </div>

            <button type="submit" id="btn-pagar" class="btn-primary" disabled>Confirmar Pago</button>
        </form>
    </main>

    <script type="module" src="../js/pago.js"></script>
</body>

</html>
