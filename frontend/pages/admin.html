<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Panel Admin - Lana &amp; Lino</title>
    <link rel="stylesheet" href="../css/global.css">
</head>

<body>
    <main class="container">
        <h1>Gestionar Productos</h1>

        <!-- Sección para Buscar y Modificar -->
        <section class="admin-section">
            <h2>Buscar para Modificar</h2>
            <div class="search-group">
                <input type="number" id="buscar-id-prod" placeholder="ID del Producto a modificar">
                <button id="btn-buscar-modificar" class="btn-primary">Buscar Producto</button>
                <button id="btn-ver-todos" class="btn-secondary">Ver Todos</button>
            </div>
            <p id="msj-busqueda"></p>
            <div id="lista-productos-admin"
                style="display:none; margin-top: 15px; max-height: 300px; overflow-y: auto; background: var(--clr-surface-2); padding: 15px; border-radius: var(--radius-md); border: 1px solid var(--clr-border);">
            </div>
        </section>

        <!-- Formulario (Sirve para crear y para modificar) -->
        <section class="admin-section">
            <h2 id="titulo-formulario">Cargar Nuevo Producto</h2>
            <form id="form-producto" class="admin-form">
                <div class="form-grid">
                    <div class="form-group">
                        <label for="prod-id">ID del Producto:</label>
                        <input type="text" id="prod-id" disabled placeholder="Automático o buscado">
                    </div>

                    <div class="form-group">
                        <label for="prod-nombre">Nombre:</label>
                        <input type="text" id="prod-nombre" required>
                    </div>

                    <div class="form-group full-width">
                        <label for="prod-desc">Descripción:</label>
                        <textarea id="prod-desc" required class="form-textarea"
                            placeholder="Breve descripción del producto..."></textarea>
                    </div>

                    <div class="form-group">
                        <label for="prod-imagen">URL de la Imagen:</label>
                        <input type="text" id="prod-imagen" placeholder="https://...">
                    </div>

                    <div class="form-group">
                        <label for="prod-precio">Precio:</label>
                        <input type="number" id="prod-precio" required>
                    </div>

                    <div class="form-group">
                        <label for="prod-genero">Género:</label>
                        <select id="prod-genero">
                            <option value="">Seleccione...</option>
                            <option value="Femenino">Femenino</option>
                            <option value="Masculino">Masculino</option>
                            <option value="Unisex">Unisex</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label for="prod-color">Color:</label>
                        <select id="prod-color">
                            <option value="">Seleccione...</option>
                            <option value="Negro">Negro</option>
                            <option value="Blanco">Blanco</option>
                            <option value="Rojo">Rojo</option>
                            <option value="Azul">Azul</option>
                            <option value="Beige">Beige</option>
                            <option value="Verde">Verde</option>
                            <option value="Gris">Gris</option>
                            <option value="Amarillo">Amarillo</option>
                            <option value="Rosa">Rosa</option>
                            <option value="Natural">Natural</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label for="prod-categoria">Categoría:</label>
                        <select id="prod-categoria" required>
                            <option value="">Seleccione...</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label for="prod-talle">Talle:</label>
                        <select id="prod-talle" required>
                            <option value="Único">Único</option>
                            <option value="S">S</option>
                            <option value="M">M</option>
                            <option value="L">L</option>
                            <option value="XL">XL</option>
                            <option value="XXL">XXL</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label for="prod-stock">Stock Disponible:</label>
                        <input type="number" id="prod-stock" required placeholder="Cantidad">
                    </div>
                </div>

                <div class="form-actions">
                    <button type="submit" id="btn-guardar-prod" class="btn-primary">Guardar Producto</button>
                    <button type="button" id="btn-cancelar-edicion" class="btn-danger" style="display:none;">Cancelar
                        Edición</button>
                </div>
            </form>
        </section>
    </main>
    <script type="module" src="../js/admin.js"></script>
</body>

</html>
