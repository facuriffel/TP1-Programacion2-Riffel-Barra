<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lana & Lino - Autenticación</title>
    <link rel="stylesheet" href="../css/global.css">
</head>

<body>
    <main class="auth-container">
        <section class="login-section">
            <h2>Iniciar Sesión</h2>
            <form id="form-login">
                <input type="email" id="login-email" placeholder="Correo electrónico" required>
                <input type="password" id="login-password" placeholder="Contraseña" required>
                <button type="submit" class="btn-primary">Ingresar</button>
            </form>
        </section>

        <section class="register-section">
            <h2>Crear Cuenta Nueva</h2>
            <form id="form-register">
                <input type="text" id="reg-nombre" placeholder="Nombre" required>
                <input type="text" id="reg-apellido" placeholder="Apellido" required>
                <input type="text" id="reg-direccion" placeholder="Dirección de Envío" required>
                <input type="text" id="reg-telefono" placeholder="Teléfono de Contacto" required>
                <input type="email" id="reg-email" placeholder="Correo electrónico" required>
                <input type="password" id="reg-password" placeholder="Contraseña" required>
                <button type="submit" class="btn-primary">Registrarme</button>
            </form>
        </section>
    </main>

    <script type="module" src="../js/login.js"></script>
</body>

</html>
